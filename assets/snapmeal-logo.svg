<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
<defs>
<linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
<stop offset="0" stop-color="#2fd4ff"></stop><stop offset="0.45" stop-color="#1e8fff"></stop><stop offset="1" stop-color="#0b6fdb"></stop>
</linearGradient>
<linearGradient id="inkGrad" x1="0" y1="0" x2="0.6" y2="1">
<stop offset="0" stop-color="#565c66"></stop><stop offset="0.35" stop-color="#1a1d22"></stop><stop offset="1" stop-color="#050608"></stop>
</linearGradient>
<linearGradient id="cyanGrad" x1="0" y1="1" x2="0" y2="0">
<stop offset="0" stop-color="#1e8fff"></stop><stop offset="1" stop-color="#2fd4ff"></stop>
</linearGradient>
<filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
<feGaussianBlur stdDeviation="7" result="b"></feGaussianBlur><feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
</filter>
<filter id="drop" x="-30%" y="-30%" width="160%" height="160%">
<feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.45"></feDropShadow>
</filter>
</defs>

<g filter="url(#glow)" stroke="url(#cyanGrad)" fill="none" stroke-linecap="round" stroke-linejoin="round">
